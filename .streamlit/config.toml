[theme]
# Apple's Signature "San Francisco" Blue
primaryColor = "#007aff" 

# Clean White Background for the "Wallet" feel
backgroundColor = "#ffffff" 

# Soft gray for sidebars and containers
secondaryBackgroundColor = "#f5f5f7" 

# Dark gray/black text for readability
textColor = "#1d1d1f" 

# Professional sans-serif font
font = "sans serif"