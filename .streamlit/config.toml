[theme]
# Stripe-inspired palette
primaryColor     = "#635BFF"   # Stripe indigo-purple — buttons, sliders, active tabs
backgroundColor  = "#F6F9FC"   # Stripe page background — very light blue-grey
secondaryBackgroundColor = "#FFFFFF"  # Cards, sidebar, input fields — pure white
textColor        = "#0A2540"   # Stripe dark navy — all body text
font             = "sans serif"
